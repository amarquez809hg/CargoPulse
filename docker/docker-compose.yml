# Cargo Pulse — Docker stack (Postgres + Gunicorn)
name: cargopulse

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cargopulse}
      POSTGRES_USER: ${POSTGRES_USER:-cargopulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in docker/.env}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cargopulse} -d ${POSTGRES_DB:-cargopulse}"]
      interval: 5s
      timeout: 5s
      retries: 8

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-cargopulse}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cargopulse}
    ports:
      - "${WEB_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_data:/app/staticfiles

volumes:
  pg_data:
  static_data:
