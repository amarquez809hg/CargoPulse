{% load i18n %}
<label>{% trans "Address" %}</label>
{% if GOOGLE_MAPS_ENABLED %}
<div class="cp-places-field"
     data-cp-places-field
     data-cp-places-city-target="current_city"
     data-cp-places-initial="{{ f.location_address|default:''|escape }}"
     data-cp-places-placeholder="{% trans 'Start typing an address…' %}">
  <input type="hidden" name="location_address" value="{{ f.location_address|default:'' }}"/>
</div>
{% else %}
<input name="location_address" value="{{ f.location_address|default:'' }}" placeholder="{% trans 'Start typing an address…' %}"/>
{% endif %}
