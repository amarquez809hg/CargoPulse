{% load i18n %}
<div class="cp-header-theme">
  <button
    type="button"
    class="cp-header-theme-btn"
    id="cp-theme-toggle"
    aria-label="{% trans 'Switch to light mode' %}"
    title="{% trans 'Light mode' %}"
    data-label-light="{% trans 'Switch to light mode' %}"
    data-label-dark="{% trans 'Switch to dark mode' %}"
    data-title-light="{% trans 'Light mode' %}"
    data-title-dark="{% trans 'Dark mode' %}"
  >
    <svg class="cp-theme-icon cp-theme-icon--sun" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="1.6"/>
      <path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
    <svg class="cp-theme-icon cp-theme-icon--moon" viewBox="0 0 24 24" aria-hidden="true" hidden>
      <path d="M20 14.5A7.5 7.5 0 0 1 9.5 4 6 6 0 1 0 20 14.5Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
    </svg>
  </button>
</div>
