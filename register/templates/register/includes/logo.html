{% load static %}
<div class="cp-logo-wrap{% if on_dark %} cp-logo-wrap--on-dark{% endif %}">
  <img
    src="{% static 'register/img/cargo-pulse-logo-on-dark.svg' %}"
    alt="Cargo Pulse"
    class="cp-logo-img cp-logo-img--dark"
    width="220"
    height="auto"
  />
  <img
    src="{% static 'register/img/cargo-pulse-logo-on-light.svg' %}"
    alt="Cargo Pulse"
    class="cp-logo-img cp-logo-img--light"
    width="220"
    height="auto"
  />
</div>
